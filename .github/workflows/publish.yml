name: Publish site

# Builds and deploys the Quarto site to GitHub Pages. Runs on every push
# to main, plus a manual button (workflow_dispatch) for re-running.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write   # needed to push to gh-pages branch

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check out site repo
        uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Clone content repo and sync flagged articles
        env:
          # Personal Access Token with read access to UnbiasedEstimation/content.
          # Required if the content repo is private; harmless if public (just unused).
          # Add this in the site repo's Settings → Secrets and variables → Actions.
          CONTENT_REPO_TOKEN: ${{ secrets.CONTENT_REPO_TOKEN }}
        run: |
          # Authenticate the clone with the PAT when present, otherwise fall back
          # to anonymous HTTPS (which works only if the content repo is public).
          if [ -n "$CONTENT_REPO_TOKEN" ]; then
            CLONE_URL="https://x-access-token:${CONTENT_REPO_TOKEN}@github.com/UnbiasedEstimation/content.git"
          else
            CLONE_URL="https://github.com/UnbiasedEstimation/content.git"
          fi
          git clone --depth=1 "$CLONE_URL" _content_src
          chmod +x scripts/sync-content.sh
          ./scripts/sync-content.sh

      - name: Render and publish to gh-pages
        uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
